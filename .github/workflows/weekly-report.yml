name: Weekly community report

# オンデマンド（手動）で週報を生成する。定期スケジュールはしない。
# 対象期間は「生成日から遡って1週間」（既定）。since/until で明示指定も可能。
#
# 必要な設定:
#   - Secrets:   DISCORD_TOKEN, ANTHROPIC_API_KEY, GUILD_ID, INTRO_CHANNEL_ID,
#                DASHBOARD_PASSWORD（ダッシュボード閲覧パスワード）
#   - (任意) Variables: EXCLUDE_CHANNEL_IDS

on:
  workflow_dispatch:
    inputs:
      since:
        description: "集計開始日 YYYY-MM-DD（省略時は前回の週報生成時点）"
        required: false
        type: string
      until:
        description: "集計終了日 YYYY-MM-DD（省略時は現在）"
        required: false
        type: string
      skip_report:
        description: "レポート生成をスキップ（指標のみ更新）"
        required: false
        type: boolean
        default: false
      member_days:
        description: "メンバー別ダッシュボードの集計単位日数（省略時は7日）"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: weekly-report
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Japanese font (for graph legend)
        run: sudo apt-get update && sudo apt-get install -y fonts-ipafont-gothic

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check dashboard password secret
        env:
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
        run: |
          if [ -z "$DASHBOARD_PASSWORD" ]; then
            echo "::error::Secrets に DASHBOARD_PASSWORD が未設定です。ダッシュボードをパスワード保護するため、Settings → Secrets and variables → Actions で DASHBOARD_PASSWORD を登録してください。"
            exit 1
          fi

      - name: Generate weekly report
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GUILD_ID: ${{ secrets.GUILD_ID }}
          INTRO_CHANNEL_ID: ${{ secrets.INTRO_CHANNEL_ID }}
          EXCLUDE_CHANNEL_IDS: ${{ vars.EXCLUDE_CHANNEL_IDS }}
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
          TIMEZONE: Asia/Tokyo
          MEMBER_ACTIVITY_DAYS: ${{ inputs.member_days || '7' }}
        run: |
          python main.py --weekly \
            ${{ inputs.since && format('--since {0}', inputs.since) || '' }} \
            ${{ inputs.until && format('--until {0}', inputs.until) || '' }} \
            ${{ inputs.skip_report == true && '--skip-report' || '' }}

      - name: Commit updated metrics and dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # docs/ を丸ごとステージ: data.enc の追加と平文 data.json の削除を両方拾う
          git add metrics_history.csv metrics_graph.png activity_graph.png activity_history.csv docs/
          if git diff --cached --quiet; then
            echo "指標に変化がないためコミットをスキップします。"
          else
            git commit -m "Update community metrics and dashboard (weekly report run)"
            git push origin "HEAD:${{ github.ref_name }}"
          fi
